<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#bf2a02"/>
  <!-- Subtle warm gradient overlay -->
  <rect width="512" height="512" rx="112" fill="url(#grad)" opacity="0.35"/>
  <!-- Wallet body -->
  <rect x="96" y="160" width="320" height="220" rx="28" fill="#ffffff" opacity="0.95"/>
  <!-- Wallet flap -->
  <rect x="96" y="160" width="320" height="72" rx="28" fill="#ffffff"/>
  <rect x="96" y="204" width="320" height="28" fill="#ffffff"/>
  <!-- Coin slot hole -->
  <rect x="310" y="236" width="88" height="52" rx="26" fill="#feffd5"/>
  <!-- Coin circle -->
  <circle cx="354" cy="262" r="22" fill="#ffac99"/>
  <circle cx="354" cy="262" r="14" fill="#bf2a02" opacity="0.6"/>
  <!-- Horizontal lines inside wallet (money stacks) -->
  <rect x="128" y="248" width="140" height="10" rx="5" fill="#bf2a02" opacity="0.2"/>
  <rect x="128" y="272" width="100" height="10" rx="5" fill="#bf2a02" opacity="0.15"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffac99"/>
      <stop offset="100%" stop-color="#0e0f09"/>
    </linearGradient>
  </defs>
</svg>
